[build]
builder = "NIXPACKS"

[deploy]
startCommand = "npm start"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[env]
NODE_ENV = "production"

[[services]]
name = "web"
source = "."
command = "npm start"

[[services]]
name = "telegram-bot"
source = "."
command = "npm run telegram-simple"
